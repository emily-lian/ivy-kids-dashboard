// ── Ivy Kids Brand Colors ──────────────────────────────────────────────────
const IVY_NAVY  = "#0C2754";

const CITRON    = "#D1C360";

const curYear=new Date().getFullYear();
const SCHOOL_YEARS=Array.from({length:8},(_,i)=>{const y=curYear-i;return`${y}–${String(y+1).slice(2)}`;});

const STATUS_MAP={high_performing:{bg:"#d1fae5",color:"#065f46",label:"High performing"},on_track:{bg:"#dbeafe",color:"#1e40af",label:"On track"},needs_support:{bg:"#fef3c7",color:"#92400e",label:"Needs support"},urgent:{bg:"#fee2e2",color:"#991b1b",label:"Urgent"}};

// ── Cognia Framework ───────────────────────────────────────────────────────
const COGNIA_FRAMEWORK=`Cognia Early Learning Accreditation Standards — use these to evaluate readiness:

Key Characteristic #1 — Culture of Learning:
A healthy culture is evident where stakeholders are actively engaged and supportive of the institution's mission, learners' academic and non-academic needs and interests are the focal point, and stakeholders are included and supported.

Key Characteristic #2 — Leadership for Learning:
Leadership for learning is demonstrated when school leaders communicate expectations for learning, influence and impact the culture in positive ways, and model and engage in learning while supporting others to do so.

Key Characteristic #3 — Engagement of Learning:
Engagement is demonstrated when all learners are included in the learning process, participate with confidence, and have agency over their learning.

Key Characteristic #4 — Growth in Learning:
Growth is evident when learners possess non-academic skills that ensure readiness to learn, learners' academic achievement reflects preparedness to learn, learners demonstrate growth in meeting expectations of learning as defined by the institution, and learners attain knowledge and skills necessary to achieve goals for learning.

Cognia accreditation requires centers to produce narrative write-ups for: stakeholder feedback analysis, learning environment observations analysis, and a self-assessment. When identifying accreditation risks and trajectory, map findings to these four characteristics and flag which narrative write-ups will need to address each concern.`;

function uid(){return Math.random().toString(36).slice(2,9);}
function parsePaste(raw){
  const lines=raw.trim().split("\n");
  if(lines.length<2||!lines[0].includes("\t"))return raw;
  return lines.map(l=>l.split("\t").join(" | ")).join("\n");
}
function extractSheetId(url){const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);return m?m[1]:null;}
function extractDocId(url){const m=url.match(/\/document\/d\/([a-zA-Z0-9-_]+)/);return m?m[1]:null;}

const PROXY="https://ivy-kids-proxy.emily-79b.workers.dev";

// ── localStorage ───────────────────────────────────────────────────────────
function loadState(){
  try{
    const raw=localStorage.getItem("ivykids_centers");

function saveApiKey(k){try{if(k)localStorage.setItem("ivykids_apikey",k);else localStorage.removeItem("ivykids_apikey");}catch(e){}}

// ── Google APIs ────────────────────────────────────────────────────────────
async function fetchSheetTabs(sheetId,apiKey){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}?key=${apiKey}`);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  return d.sheets.map(s=>({id:s.properties.sheetId,title:s.properties.title}));
}
async function fetchTabData(sheetId,tabTitle,apiKey){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(tabTitle)}?key=${apiKey}`);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  if(!d.values?.length)return"(empty tab)";
  return d.values.map(row=>row.join(" | ")).join("\n");
}
function docBodyToText(content){
  if(!content?.length)return"(empty document)";
  const lines=[];
  for(const block of content){
    if(block.paragraph){
      const text=block.paragraph.elements?.map(el=>el.textRun?.content||"").join("").trimEnd();
      if(text)lines.push(text);
    }else if(block.table){
      for(const row of block.table.tableRows||[]){
        const cells=(row.tableCells||[]).map(cell=>(cell.content||[]).flatMap(b=>(b.paragraph?.elements||[]).map(el=>el.textRun?.content||"")).join("").trim());
        if(cells.some(c=>c))lines.push(cells.join(" | "));
      }
    }
  }
  return lines.join("\n")||"(no readable content found)";
}
async function fetchDocContent(docId,apiKey){
  const r=await fetch(`https://docs.googleapis.com/v1/documents/${docId}?key=${apiKey}`);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  return{title:d.title||"Untitled",text:docBodyToText(d.body?.content)};
}

// ── QA PDF Parser ──────────────────────────────────────────────────────────
async function parseQAPdf(file){
  const base64=await new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(",")[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
  const res=await fetch(`${PROXY}/qa/parse`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({pdfBase64:base64}),
  });
  if(!res.ok){const err=await res.text();throw new Error(`QA parse failed: ${err.slice(0,200)}`);}
  return res.json();
}
function formatQADataAsText(qaData){
  const{visit,classrooms,ed_observations,center_operations,overall}=qaData;
  const lines=[];
  lines.push(`QA Visit: ${visit.date} (${visit.school_year})`);
  lines.push(`Consultant: ${visit.consultant||"N/A"}`);
  if(visit.center_director)lines.push(`Center Director: ${visit.center_director}`);
  if(visit.education_director)lines.push(`Education Director: ${visit.education_director}`);
  lines.push(`Overall Score: ${overall.overall_score}% — ${overall.is_passing?"PASSING":"FAILING"}`);
  lines.push(`Classrooms Average: ${overall.classrooms_avg}%`);
  if(overall.center_noncompliant)lines.push(`⚠ CENTER NON-COMPLIANCE: ${overall.nc_classroom_count} classroom(s) flagged`);
  lines.push("");lines.push("CLASSROOM SCORES:");
  classrooms.forEach(c=>{
    lines.push(`  ${c.name} (${c.teachers}): ${c.score_pct}%${c.is_noncompliant?" [NON-COMPLIANCE]":""}`);
    if(c.missed_items?.length)c.missed_items.forEach(m=>lines.push(`    MISSED [${m.weight}]: ${m.standard}${m.comment?" — "+m.comment:""}`));
    if(c.notable_positives?.length)c.notable_positives.forEach(p=>lines.push(`    POSITIVE: ${p}`));
  });
  if(ed_observations?.score_pct!=null){
    lines.push("");lines.push(`ED OBSERVATIONS & ASSESSMENTS: ${ed_observations.score_pct}%${ed_observations.is_noncompliant?" [NON-COMPLIANCE]":""}`);
    ed_observations.missed_items?.forEach(m=>lines.push(`  MISSED [${m.weight}]: ${m.standard}${m.comment?" — "+m.comment:""}`));
  }
  if(center_operations?.score_pct!=null){
    lines.push("");lines.push(`CENTER OPERATIONS: ${center_operations.score_pct}%${center_operations.is_noncompliant?" [NON-COMPLIANCE]":""}`);
    center_operations.missed_items?.forEach(m=>lines.push(`  MISSED [${m.weight}]: ${m.standard}${m.comment?" — "+m.comment:""}`));
  }
  if(overall.cross_classroom_patterns?.length){
    lines.push("");lines.push("CROSS-CLASSROOM PATTERNS:");
    overall.cross_classroom_patterns.forEach(p=>lines.push(`  • ${p}`));
  }
  return lines.join("\n");
}

// ── Anthropic API ──────────────────────────────────────────────────────────
async function callClaude(prompt){
  const estTokens=Math.ceil(prompt.length/4);
  if(estTokens>190000)throw new Error(`Prompt too large: ~${estTokens} tokens.`);
  const res=await fetch(`${PROXY}/anthropic`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,messages:[{role:"user",content:prompt}]})
  });
  const raw=await res.text();
  if(!res.ok)throw new Error(`API ${res.status}: ${raw.slice(0,200)}`);
  let data;
  try{data=JSON.parse(raw);}catch(e){throw new Error(`Bad JSON from proxy: ${raw.slice(0,200)}`);}
  const text=data.content?.find(b=>b.type==="text")?.text||"";
  if(!text)throw new Error(`Empty response: ${JSON.stringify(data).slice(0,300)}`);
  const cleaned=text.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  const start=cleaned.indexOf("{");const end=cleaned.lastIndexOf("}");
  if(start===-1||end===-1)throw new Error(`No JSON found: ${cleaned.slice(0,300)}`);
  return JSON.parse(cleaned.slice(start,end+1));
}
function truncateEntry(raw,maxChars=300){
  if(!raw||raw.length<=maxChars)return raw;
  return raw.slice(0,maxChars)+"…[truncated]";
}
function estimateTokens(text){return Math.ceil((text||"").length/4);}

async function summarizeReportType(center,year,reportType,entries){
  if(!entries?.length)return null;
  const content=entries.map((e,i)=>{
    const truncated=truncateEntry(e.raw,300);
    return`Entry ${i+1}${e.title?" ("+e.title+")":""}: ${truncated}`;
  }).join("\n");
  const safeContent=content.length>4000?content.slice(0,4000)+"…[truncated]":content;
  const prompt=`Summarize this ${reportType} for ${center} (${year}) in 80 words max. Include: quality level, top strength, top concern, any classrooms mentioned.\n\n${safeContent}\n\nOnly the summary, no headers.`;
  if(estimateTokens(prompt)>5000)return`[${reportType} ${year}: too large]`;
  const res=await fetch(`${PROXY}/anthropic`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,messages:[{role:"user",content:prompt}]})
  });
  const raw=await res.text();
  if(!res.ok)return`[${reportType} ${year}: summary unavailable]`;
  const data=JSON.parse(raw);
  return data.content?.find(b=>b.type==="text")?.text||"[No summary]";
}

async function analyzeCenterMultiYear(center,sortedYears,latestYear){
  const sections=[];
  sortedYears.forEach(({year,data})=>{
    REPORT_TYPES.forEach(rt=>{
      (data.reports[rt.key]||[]).forEach(e=>{
        if(e.raw?.trim())sections.push(`=== [${year}${year===latestYear?" — CURRENT YEAR":""}] ${rt.label}${e.title?" — "+e.title:""} ===\n${e.raw}`);
      });
    });
  });
  if(!sections.length)return null;
  const prompt=`You are an early childhood education QA expert analyzing center data for Cognia accreditation.
Center: ${center}
Years of data (oldest→newest): ${sortedYears.map(y=>y.year).join(", ")}
Current/most recent year: ${latestYear}

${COGNIA_FRAMEWORK}

All reports in chronological order:
${sections.join("\n\n")}

CRITICAL: "currentYear" fields = ONLY most recent year (${latestYear}). "multiYearTrends" = patterns across ALL years.

For accreditationRisks: map each risk to the most relevant Cognia Key Characteristic (1–4) and identify which Cognia narrative write-up it affects (stakeholder feedback analysis, learning environment observations analysis, or self-assessment).

For accreditationTrajectory: assess readiness across all four Cognia Key Characteristics and identify which narrative write-ups will need the most work.

Respond ONLY with valid JSON (no markdown fences):
{"currentYear":{"year":"${latestYear}","score":<1-100>,"summary":"2-3 sentences on this year only","strengthThemes":[{"theme":"...","detail":"...","sources":["qa","cd",...],"classrooms":[]}],"improvementThemes":[{"theme":"...","detail":"...","severity":"low|medium|high","sources":[],"classrooms":[],"isNew":true}],"classroomSpotlights":[{"classroom":"...","status":"needs_attention|performing_well","highlights":["..."],"sources":[]}],"inconsistencies":[{"issue":"...","detail":"...","flaggedIn":[],"notFlaggedIn":[],"riskLevel":"low|medium|high"}],"accreditationRisks":[{"risk":"...","cognia_characteristic":"Culture of Learning|Leadership for Learning|Engagement of Learning|Growth in Learning","cognia_narrative":"stakeholder feedback analysis|learning environment observations analysis|self-assessment","severity":"low|medium|high"}],"recommendedActions":[{"action":"...","priority":"immediate|short_term|long_term","owner":"CD|ED|Director|Staff|All","linkedTheme":"..."}]},"multiYearTrends":{"overallTrend":"improving|stable|declining|mixed","yearlyScores":[{"year":"...","score":<1-100>,"headline":"≤8 word note"}],"persistentStrengths":[{"theme":"...","detail":"...","yearsPresent":[]}],"persistentConcerns":[{"theme":"...","detail":"...","severity":"low|medium|high","yearsPresent":[],"currentTrend":"improving|stable|declining|mixed"}],"resolvedConcerns":[{"theme":"...","detail":"...","resolvedIn":"..."}],"emergingStrengths":[{"theme":"...","detail":"...","emergedIn":"..."}],"classroomPatterns":[{"classroom":"...","pattern":"...","trend":"improving|stable|declining|mixed","yearsTracked":[]}],"inconsistencyPattern":"1-2 sentences","accreditationTrajectory":"2-3 sentences covering readiness across all 4 Cognia Key Characteristics and which narrative write-ups need most work"},"systemsLevelTags":["max 8 short tags"]}`;
  return callClaude(prompt);
}

async function analyzeSystemsMultiYear(centersData){
  const summaries=Object.entries(centersData).filter(([,v])=>v.analysis).map(([name,v])=>{
    const a=v.analysis;
    return`CENTER: ${name}\nCurrent score: ${a.currentYear?.score||"?"} | Trend: ${a.multiYearTrends?.overallTrend||"?"}\nScores: ${a.multiYearTrends?.yearlyScores?.map(y=>`${y.year}:${y.score}`).join(", ")||""}\nStrengths: ${a.currentYear?.strengthThemes?.map(t=>t.theme).join("; ")||"none"}\nConcerns: ${a.currentYear?.improvementThemes?.map(t=>`${t.theme}(${t.severity}${t.isNew?",NEW":""})`).join("; ")||"none"}\nPersistent concerns: ${a.multiYearTrends?.persistentConcerns?.map(t=>`${t.theme}(${t.currentTrend})`).join("; ")||"none"}\nAccreditation risks: ${a.currentYear?.accreditationRisks?.map(r=>`${r.risk} [${r.cognia_characteristic}]`).join("; ")||"none"}\nTags: ${a.systemsLevelTags?.join(", ")||""}`;
  });
  if(summaries.length<2)return null;
  const prompt=`You are an early childhood education systems director analyzing quality data across ${summaries.length} centers for Cognia accreditation.

${COGNIA_FRAMEWORK}

${summaries.join("\n\n---\n\n")}

For accreditationOutlook: assess system-wide readiness across all four Cognia Key Characteristics. Identify which characteristics are strongest and weakest across the system, and which Cognia narrative write-ups will require the most attention.

Respond ONLY with valid JSON (no markdown fences):
{"overview":"4-5 sentences","systemScore":<1-100>,"systemTrend":"improving|stable|declining|mixed","centerRankings":[{"center":"...","currentScore":<1-100>,"trend":"improving|stable|declining|mixed","status":"high_performing|on_track|needs_support|urgent"}],"systemicPersistentConcerns":[{"theme":"...","detail":"...","severity":"low|medium|high","centersAffected":[],"trend":"improving|stable|declining|mixed"}],"systemicCurrentConcerns":[{"theme":"...","detail":"...","severity":"low|medium|high","centersAffected":[]}],"systemWideStrengths":[{"theme":"...","detail":"...","centersAffected":[]}],"isolatedConcerns":[{"theme":"...","detail":"...","severity":"low|medium|high","centersAffected":[]}],"inconsistencyPattern":"paragraph","accreditationOutlook":{"summary":"paragraph","characteristicReadiness":[{"characteristic":"Culture of Learning|Leadership for Learning|Engagement of Learning|Growth in Learning","readiness":"strong|developing|needs_work","detail":"1-2 sentences","narrativeWriteup":"stakeholder feedback analysis|learning environment observations analysis|self-assessment"}],"priorityNarratives":["ordered list of which narrative write-ups need most attention"]},"priorityActions":[{"action":"...","scope":"all_centers|specific_centers","centers":[],"priority":"immediate|short_term|long_term"}]}`;
  return callClaude(prompt);
}

// ── Design primitives ──────────────────────────────────────────────────────
function ScoreRing({score,size=76}){
  const r=28,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const col=score>=75?"#10b981":score>=50?"#f59e0b":"#ef4444";
  return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e5e7eb" strokeWidth="5.5"/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth="5.5" strokeDasharray={`${(score/100)*circ} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${cx} ${cy})`}/>
    <text x={cx} y={cy+5} textAnchor="middle" fontSize="14" fontWeight="800" fill={col}>{score}</text>
  </svg>);
}
function Pill({text,color="#6b7280",bg="#f3f4f6"}){
  return<span style={{display:"inline-flex",alignItems:"center",padding:"2px 7px",borderRadius:99,fontSize:10,fontWeight:700,background:bg,color,border:`1px solid ${color}28`,marginRight:3,marginBottom:3}}>{text}</span>;
}
function TrendBadge({trend}){
  if(!trend)return null;
  const m=TREND_META[trend]||TREND_META.stable;
  return<span style={{fontSize:10,fontWeight:700,color:m.color}}>{m.icon} {trend.replace("_"," ")}</span>;
}
function SectionCard({title,subtitle,accentColor="#7c3aed",collapsible=false,defaultOpen=true,children}){
  const[open,setOpen]=useState(defaultOpen);
  return(<div style={{background:"#fff",borderRadius:14,border:"1px solid #f0f0f0",overflow:"hidden",marginBottom:10}}>
    <div style={{borderLeft:`4px solid ${accentColor}`,padding:"10px 14px",borderBottom:open?"1px solid #f5f5f5":"none",display:"flex",alignItems:"center",gap:10,cursor:collapsible?"pointer":"default"}} onClick={collapsible?()=>setOpen(o=>!o):undefined}>
      <span style={{fontSize:13,fontWeight:800,color:"#1f2937",flex:1}}>{title}</span>
      {subtitle&&<span style={{fontSize:11,color:"#9ca3af"}}>{subtitle}</span>}
      {collapsible&&<span style={{fontSize:11,color:"#d1d5db"}}>{open?"▲":"▼"}</span>}
    </div>
    {open&&<div style={{padding:13}}>{children}</div>}
  </div>);
}
function ScoreBar({score,label,isLatest}){
  const col=score>=75?"#10b981":score>=50?"#f59e0b":"#ef4444";
  return(<div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
    <span style={{fontSize:10,fontWeight:800,color:isLatest?col:"#9ca3af"}}>{score}</span>
    <div style={{width:"100%",background:isLatest?col:col+"50",borderRadius:"3px 3px 0 0",height:Math.max(6,(score/100)*44)}}/>
    <span style={{fontSize:8,color:isLatest?"#4b5563":"#9ca3af",textAlign:"center",lineHeight:1.2,fontWeight:isLatest?700:400}}>{label}</span>
  </div>);
}
function ThemeBlock({item,type}){
  const isS=type==="strength";
  const sev=item.severity||"medium";
  const bc=isS?"#10b981":SEVERITY_COLOR[sev];
  const bg=isS?"#f0fdf4":sev==="high"?"#fff5f5":sev==="medium"?"#fffbeb":"#eff6ff";
  return(<div style={{borderLeft:`3px solid ${bc}`,padding:"7px 7px 7px 11px",background:bg,borderRadius:"0 8px 8px 0",marginBottom:7}}>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
      <span style={{fontSize:12,fontWeight:700,color:"#1f2937"}}>{item.theme||item.risk}</span>
      {!isS&&sev&&<span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:99,background:bc+"22",color:bc}}>{sev}</span>}
      {item.isNew&&<span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:99,background:"#ede9fe",color:"#7c3aed"}}>new this year</span>}
      {item.currentTrend&&<TrendBadge trend={item.currentTrend}/>}
    </div>
    <p style={{fontSize:11,color:"#4b5563",margin:"0 0 5px",lineHeight:1.5}}>{item.detail}</p>
    {item.yearsPresent?.length>0&&<div style={{fontSize:9,color:"#7c3aed",marginBottom:4}}>📅 {item.yearsPresent.join(", ")}</div>}
    <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
      {item.classrooms?.filter(c=>c).map((c,j)=><Pill key={j} text={"🏫 "+c} color="#7c3aed" bg="#ede9fe"/>)}
      {item.sources?.map(s=><Pill key={s} text={s.toUpperCase()} color="#374151" bg="#f3f4f6"/>)}
      {item.centersAffected?.map((n,j)=><Pill key={j} text={n} color="#6b7280" bg="#f3f4f6"/>)}
    </div>
  </div>);
}

    <div style={{border:"1px solid",borderColor:entries.length?"#d1fae5":"#ebebeb",borderRadius:9,background:entries.length?"#f9fffe":"#fafafa",marginBottom:4}}>
      <button style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 11px",border:"none",background:"none",cursor:"pointer",textAlign:"left"}} onClick={()=>setOpen(o=>!o)}>

          <div style={{fontWeight:700,fontSize:12,color:"#1f2937"}}>{type.label}</div>

        </div>

          {btns.includes("pdf")&&<button onClick={e=>{e.stopPropagation();setShowQAPdf(true);}} style={{padding:"3px 9px",borderRadius:6,border:"1.5px solid #7c3aed",background:"#ede9fe",color:"#5b21b6",fontSize:10,fontWeight:700,cursor:"pointer"}}>📋 PDF</button>}
          {btns.includes("sheet")&&apiKey&&<button onClick={e=>{e.stopPropagation();setShowSheet(true);}} style={{padding:"3px 9px",borderRadius:6,border:"1.5px solid #059669",background:"none",color:"#059669",fontSize:10,fontWeight:700,cursor:"pointer"}}>📊 Sheet</button>}
          {btns.includes("paste")&&<button onClick={e=>{e.stopPropagation();onAdd();}} style={{padding:"3px 9px",borderRadius:6,border:"1.5px solid #7c3aed",background:"none",color:"#7c3aed",fontSize:10,fontWeight:700,cursor:"pointer"}}>+ Paste</button>}
        </div>
        <span style={{color:"#d1d5db",fontSize:10,marginLeft:3}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(<div style={{padding:"0 11px 9px",display:"flex",flexDirection:"column",gap:3}}>
        {entries.length===0&&<div style={{fontSize:11,color:"#9ca3af",padding:"5px 0",textAlign:"center"}}>No entries yet.</div>}
        {entries.map((e,i)=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:6,background:"#fff",border:"1px solid #e5e7eb",borderRadius:7,padding:"5px 9px"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              <span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{e.title||`${type.label} #${i+1}`}</span>
              {e.source&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:99,...srcStyle(e.source)}}>{e.source==="sheets"?"📊 Sheets":e.source==="docs"?"📄 Doc":e.source==="qa_pdf"?"📋 PDF":""}</span>}
              {e.qaData?.overall?.overall_score!=null&&(<span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:99,background:e.qaData.overall.is_passing?"#d1fae5":"#fee2e2",color:e.qaData.overall.is_passing?"#065f46":"#991b1b"}}>{e.qaData.overall.overall_score}% {e.qaData.overall.is_passing?"✓":"✗"}</span>)}
            </div>
            <div style={{fontSize:10,color:"#9ca3af",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.raw?.slice(0,70)}…</div>
          </div>
          <button onClick={()=>onEdit(i)} style={{padding:"2px 8px",borderRadius:5,border:"1px solid #e5e7eb",background:"#fff",fontSize:10,cursor:"pointer",color:"#6b7280"}}>Edit</button>
          <button onClick={()=>onRemove(i)} style={{padding:"2px 6px",borderRadius:5,border:"none",background:"none",fontSize:13,cursor:"pointer",color:"#fca5a5"}}>×</button>
        </div>))}
      </div>)}
    </div>
    {showQAPdf&&<QAPdfImportModal onImport={e=>{onImport(e);setShowQAPdf(false);}} onClose={()=>setShowQAPdf(false)}/>}
    {showSheet&&<SheetImportModal apiKey={apiKey} type={type} onImport={e=>{onImport(e);setShowSheet(false);}} onClose={()=>setShowSheet(false)}/>}
  </>);
}

// ── Year Panel ─────────────────────────────────────────────────────────────
function YearPanel({year,isLatest,yearData,apiKey,onUpdate,onRemoveYear}){
  const[open,setOpen]=useState(isLatest);
  const[modal,setModal]=useState(null);
  const totalEntries=Object.values(yearData.reports||{}).reduce((s,a)=>s+(a?.length||0),0);
  const addEntries=(k,newE)=>{const prev=yearData.reports[k]||[];onUpdate({...yearData,reports:{...yearData.reports,[k]:[...prev,...newE]}});};
  const editEntry=(k,i,d)=>{const arr=[...(yearData.reports[k]||[])];arr[i]={...arr[i],...d};onUpdate({...yearData,reports:{...yearData.reports,[k]:arr}});};
  const removeEntry=(k,i)=>{const arr=[...(yearData.reports[k]||[])];arr.splice(i,1);onUpdate({...yearData,reports:{...yearData.reports,[k]:arr}});};
  const activeModal=modal?REPORT_TYPES.find(r=>r.key===modal.typeKey):null;
  return(<div style={{border:`1.5px solid ${isLatest?"#c4b5fd":"#e5e7eb"}`,borderRadius:12,marginBottom:8,overflow:"hidden",background:"#fff"}}>
    <button style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"10px 13px",border:"none",background:open?(isLatest?"#f5f3ff":"#fafafa"):"#fff",cursor:"pointer",textAlign:"left",borderBottom:open?"1px solid #e5e7eb":"none"}} onClick={()=>setOpen(o=>!o)}>
      <span style={{fontSize:12,fontWeight:800,color:isLatest?"#4c1d95":"#6b7280",background:isLatest?"#ede9fe":"#f3f4f6",padding:"3px 10px",borderRadius:6}}>{year}{isLatest?" ★":""}</span>
      <span style={{fontSize:11,color:"#9ca3af"}}>{totalEntries} entr{totalEntries===1?"y":"ies"}</span>
      {isLatest&&<span style={{fontSize:9,color:"#7c3aed",fontWeight:700,background:"#ede9fe",padding:"2px 7px",borderRadius:99}}>Current Year</span>}
      <button onClick={e=>{e.stopPropagation();if(window.confirm(`Remove all data for ${year}?`))onRemoveYear();}} style={{marginLeft:"auto",padding:"2px 8px",borderRadius:5,border:"1px solid #fca5a5",background:"none",color:"#ef4444",fontSize:10,cursor:"pointer"}}>Remove</button>
      <span style={{color:"#d1d5db",fontSize:10,marginLeft:3}}>{open?"▲":"▼"}</span>
    </button>
    {open&&(<div style={{padding:11}}>
      {REPORT_TYPES.map(rt=>(<ReportTypeRow key={rt.key} type={rt} entries={yearData.reports[rt.key]||[]} apiKey={apiKey}
        onAdd={()=>setModal({typeKey:rt.key})}
        onImport={e=>addEntries(rt.key,e)}
        onEdit={i=>setModal({typeKey:rt.key,entryIdx:i})}
        onRemove={i=>removeEntry(rt.key,i)}/>))}
    </div>)}
    {activeModal&&(<EntryModal type={activeModal}
      entry={modal.entryIdx!=null?(yearData.reports[modal.typeKey]||[])[modal.entryIdx]:null}
      onSave={d=>{modal.entryIdx!=null?editEntry(modal.typeKey,modal.entryIdx,d):addEntries(modal.typeKey,[{id:uid(),...d}]);setModal(null);}}
      onClose={()=>setModal(null)}/>)}
  </div>);
}

// ── Main App ───────────────────────────────────────────────────────────────
function App(){
  const init=loadState();
  const[centers,setCenters]=useState(init.centers);
  const[apiKey,setApiKeyState]=useState(init.apiKey);
  const[sysAnalysis,setSysAnalysis]=useState(init.sysAnalysis);
  const[active,setActive]=useState(Object.keys(init.centers)[0]);
  const[mainTab,setMainTab]=useState("centers");
  const[centerTab,setCenterTab]=useState("data");
  const[loading,setLoading]=useState(false);
  const[loadingMsg,setLoadingMsg]=useState("");
  const[sysLoading,setSysLoading]=useState(false);
  const[search,setSearch]=useState("");
  const[addingCenter,setAddingCenter]=useState(false);
  const[newName,setNewName]=useState("");
  const[showAddYear,setShowAddYear]=useState(false);
  const[selectedNewYear,setSelectedNewYear]=useState(SCHOOL_YEARS[0]);
  const[showApiPanel,setShowApiPanel]=useState(false);

  useEffect(()=>saveCenters(centers),[centers]);
  useEffect(()=>saveSysAnalysis(sysAnalysis),[sysAnalysis]);
  const handleSaveApiKey=useCallback(k=>{setApiKeyState(k);saveApiKey(k);if(k)setShowApiPanel(false);},[]);

  const cd=centers[active]||{years:{},analysis:null};
  const centerYears=useMemo(()=>Object.keys(cd.years||{}).sort((a,b)=>b.localeCompare(a)),[cd.years]);
  const latestYear=centerYears[0]||null;
  const hasAnalysis=!!cd.analysis;
  const totalEntries=useMemo(()=>centerYears.reduce((s,y)=>s+Object.values(cd.years[y].reports||{}).reduce((ss,a)=>ss+(a?.length||0),0),0),[centerYears,cd.years]);
  const analyzedCount=useMemo(()=>Object.values(centers).filter(v=>v.analysis).length,[centers]);
  const filteredCenters=useMemo(()=>Object.keys(centers).filter(n=>n.toLowerCase().includes(search.toLowerCase())),[centers,search]);
  const availableYears=SCHOOL_YEARS.filter(y=>!cd.years[y]);
  const a=cd.analysis;const cy=a?.currentYear;const mt=a?.multiYearTrends;

  const updateYearData=useCallback((yearKey,newData)=>setCenters(prev=>({...prev,[active]:{...prev[active],analysis:null,years:{...prev[active].years,[yearKey]:newData}}})),[active]);
  const removeYear=useCallback(yearKey=>setCenters(prev=>{const y={...prev[active].years};delete y[yearKey];return{...prev,[active]:{...prev[active],years:y,analysis:null}};}),[active]);
  const addYear=()=>{if(cd.years[selectedNewYear])return;setCenters(prev=>({...prev,[active]:{...prev[active],years:{...prev[active].years,[selectedNewYear]:{reports:{},analysis:null}}}}));setShowAddYear(false);};
  const switchCenter=n=>{setActive(n);setCenterTab("data");};
  const addCenter=()=>{const n=newName.trim();if(!n||centers[n])return;setCenters(prev=>({...prev,[n]:{years:{},analysis:null}}));setActive(n);setNewName("");setAddingCenter(false);setCenterTab("data");};

  const runCenterAnalysis=async()=>{
    setLoading(true);setLoadingMsg("Preparing reports…");
    try{
      const sortedYears=[...centerYears].sort((a,b)=>a.localeCompare(b)).filter(y=>Object.values(cd.years[y].reports||{}).some(a=>a?.length)).map(y=>({year:y,data:cd.years[y]}));
      setLoadingMsg(`Summarizing ${sortedYears.length} year${sortedYears.length!==1?"s":""} of data…`);
      const result=await analyzeCenterMultiYear(active,sortedYears,latestYear);
      setCenters(prev=>({...prev,[active]:{...prev[active],analysis:result}}));
      setCenterTab("analysis");
    }catch(e){alert("Analysis failed.\n"+e.message);}
    finally{setLoading(false);setLoadingMsg("");}
  };
  const runSystemsAnalysis=async()=>{
    setSysLoading(true);
    try{const r=await analyzeSystemsMultiYear(centers);setSysAnalysis(r);}
    catch(e){alert("Systems analysis failed.\n"+e.message);}
    finally{setSysLoading(false);}
  };
  const flagCount=name=>{const an=centers[name]?.analysis?.currentYear;if(!an)return 0;return(an.inconsistencies?.length||0)+(an.improvementThemes?.filter(t=>t.severity==="high").length||0);};

  return(<div style={{display:"flex",flexDirection:"column",height:"100vh",background:OFF_WHITE,overflow:"hidden"}}>
    {/* Header */}
    <div style={{background:IVY_NAVY,borderBottom:`2px solid ${IVY_DEEP}`,padding:"8px 20px",display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
      <img src="https://emily-lian.github.io/ivy-kids-dashboard/ivy-kids-logo.png" alt="Ivy Kids" style={{height:42,width:42,objectFit:"contain",borderRadius:"50%",background:"white",padding:2,flexShrink:0}}
        onError={e=>{e.target.style.display="none";}}/>
      <div>
        <div style={{fontSize:9,fontWeight:600,letterSpacing:"0.15em",color:SKY_BLUE,textTransform:"uppercase"}}>Ivy Kids Systems</div>
        <div style={{fontSize:16,fontWeight:700,color:"white",lineHeight:1.2}}>Quality Assurance Dashboard</div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
        {[["centers","🏫 Centers"],["systems","🌐 Systems Overview"]].map(([t,lbl])=>(<button key={t} onClick={()=>setMainTab(t)} style={{padding:"6px 13px",borderRadius:7,fontSize:11,fontWeight:600,border:`1.5px solid ${mainTab===t?CITRON:SKY_BLUE+"80"}`,cursor:"pointer",background:mainTab===t?CITRON:IVY_BLUE,color:mainTab===t?IVY_DEEP:"white"}}>{lbl}</button>))}
        <button onClick={()=>setShowApiPanel(s=>!s)} style={{padding:"6px 11px",borderRadius:7,fontSize:11,fontWeight:600,border:`1.5px solid ${apiKey?"#10b981":CITRON}`,background:apiKey?"#064e3b":"rgba(209,195,96,0.15)",color:apiKey?"#6ee7b7":CITRON,cursor:"pointer"}}>
          {apiKey?"📊 Sheets ✓":"📊 Connect Sheets"}
        </button>
      </div>
      <div style={{fontSize:10,color:SKY_BLUE,display:"flex",alignItems:"center",gap:5}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:"#10b981",display:"inline-block"}}/>Claude AI
      </div>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:205,background:"#fff",borderRight:"1px solid #e5e7eb",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"9px 9px 4px"}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search centers…" style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:7,padding:"5px 9px",fontSize:11,outline:"none",background:"#f9fafb"}}/></div>
        <div style={{padding:"3px 8px 4px",fontSize:9,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.1em"}}>{analyzedCount}/{Object.keys(centers).length} analyzed</div>
        <div style={{flex:1,overflowY:"auto",padding:"0 6px 6px"}}>
          {filteredCenters.map(name=>{
            const flags=flagCount(name),isA=name===active,analyzed=!!centers[name].analysis;
            const yrs=Object.keys(centers[name].years||{}).length;
            const trend=centers[name].analysis?.multiYearTrends?.overallTrend;
            const tm=trend?TREND_META[trend]:null;
            return(<button key={name} onClick={()=>{switchCenter(name);setMainTab("centers");}} style={{width:"100%",textAlign:"left",padding:"7px 9px",borderRadius:7,border:"none",cursor:"pointer",marginBottom:1,background:isA?"#ede9fe":"transparent",color:isA?"#5b21b6":"#374151",display:"flex",alignItems:"center",gap:5}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:isA?700:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{name}</div>
                <div style={{fontSize:9,color:analyzed?"#10b981":"#9ca3af",marginTop:1,display:"flex",alignItems:"center",gap:4}}>
                  {analyzed&&<span>✓</span>}{tm&&<span style={{color:tm.color,fontWeight:700}}>{tm.icon}</span>}<span>{yrs} yr{yrs!==1?"s":""}</span>
                </div>
              </div>
              {flags>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"1px 5px",flexShrink:0}}>{flags}</span>}
            </button>);
          })}
        </div>
        <div style={{padding:8,borderTop:"1px solid #f3f4f6"}}>
          {addingCenter?(<div style={{display:"flex",flexDirection:"column",gap:4}}>
            <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCenter()} placeholder="Center name…" style={{border:"1px solid #ddd",borderRadius:6,padding:"5px 8px",fontSize:11,outline:"none"}}/>
            <div style={{display:"flex",gap:3}}>
              <button onClick={addCenter} style={{flex:1,background:"#7c3aed",color:"#fff",border:"none",borderRadius:6,padding:4,fontSize:10,fontWeight:700,cursor:"pointer"}}>Add</button>
              <button onClick={()=>setAddingCenter(false)} style={{flex:1,border:"1px solid #ddd",background:"#fff",borderRadius:6,padding:4,fontSize:10,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>):(<button onClick={()=>setAddingCenter(true)} style={{width:"100%",border:"2px dashed #d1d5db",borderRadius:7,padding:6,fontSize:10,color:"#9ca3af",background:"transparent",cursor:"pointer"}}>+ Add Center</button>)}
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,overflowY:"auto",padding:18}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          {showApiPanel&&<ApiKeyPanel apiKey={apiKey} onSave={handleSaveApiKey}/>}

          {/* Systems Tab */}
          {mainTab==="systems"&&(<div>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16,gap:12}}>
              <div><h2 style={{fontSize:19,fontWeight:800,color:"#1f2937",margin:0}}>Systems-Level Overview</h2><p style={{fontSize:11,color:"#9ca3af",margin:"3px 0 0"}}>{analyzedCount} centers analyzed · Multi-year patterns · Cognia readiness</p></div>
              <button onClick={runSystemsAnalysis} disabled={sysLoading||analyzedCount<2} style={{padding:"8px 16px",borderRadius:8,border:"none",fontSize:11,fontWeight:600,cursor:sysLoading||analyzedCount<2?"not-allowed":"pointer",background:sysLoading||analyzedCount<2?"#e5e7eb":`linear-gradient(135deg,${IVY_NAVY},${IVY_BLUE})`,color:sysLoading||analyzedCount<2?"#9ca3af":"#fff"}}>
                {sysLoading?"🔄 Analyzing…":"🌐 Run Systems Analysis"}
              </button>
            </div>
            {analyzedCount<2&&!sysAnalysis&&(<div style={{textAlign:"center",padding:"50px 20px",color:"#9ca3af",fontSize:12,background:"#fff",borderRadius:14,border:"2px dashed #e5e7eb"}}><div style={{fontSize:28,marginBottom:10}}>🌐</div>Analyze at least 2 centers to unlock.<br/><span style={{fontSize:10}}>({analyzedCount}/2 minimum)</span></div>)}
            {sysAnalysis&&(<div>
              <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:16,display:"flex",gap:14,alignItems:"center",marginBottom:10}}>
                <ScoreRing score={sysAnalysis.systemScore}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:9,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.08em"}}>System-Wide Summary</span>{sysAnalysis.systemTrend&&<TrendBadge trend={sysAnalysis.systemTrend}/>}</div>
                  <p style={{fontSize:12,color:"#374151",lineHeight:1.65,margin:0}}>{sysAnalysis.overview}</p>

                  const s=STATUS_MAP[c.status]||STATUS_MAP.on_track;const tm=TREND_META[c.trend]||TREND_META.stable;

                    <span style={{fontSize:10,fontWeight:700,color:tm.color}}>{tm.icon} {c.trend}</span>
                    <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99,background:s.bg,color:s.color}}>{s.label}</span>
                    <div style={{width:64,height:5,background:"#e5e7eb",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:c.currentScore+"%",background:c.currentScore>=75?"#10b981":c.currentScore>=50?"#f59e0b":"#ef4444",borderRadius:3}}/></div>

              </SectionCard>

              {sysAnalysis.systemicCurrentConcerns?.length>0&&<SectionCard title="🟠 Systemic Current Concerns" subtitle="Multiple centers, this year" accentColor="#f59e0b">{sysAnalysis.systemicCurrentConcerns.map((c,i)=><ThemeBlock key={i} item={c} type="concern"/>)}</SectionCard>}

              {sysAnalysis.isolatedConcerns?.length>0&&<SectionCard title="🟡 Isolated Concerns" subtitle="Center-specific" accentColor="#f59e0b" collapsible defaultOpen={false}>{sysAnalysis.isolatedConcerns.map((c,i)=><ThemeBlock key={i} item={c} type="concern"/>)}</SectionCard>}

                {sysAnalysis.accreditationOutlook.priorityNarratives?.length>0&&(<div style={{marginTop:10,padding:"10px 12px",background:"#f0f4ff",borderRadius:8,border:`1px solid ${SKY_BLUE}`}}>
                  <div style={{fontSize:10,fontWeight:800,color:IVY_NAVY,marginBottom:6}}>📝 Priority Narrative Write-Ups</div>

              </SectionCard>)}
              {sysAnalysis.priorityActions?.length>0&&<SectionCard title="📋 System-Level Priority Actions" accentColor="#6366f1">
                {sysAnalysis.priorityActions.map((act,i)=>{const pc=PRIORITY_COLOR[act.priority]||"#6b7280";return(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 10px",background:"#fafafa",borderRadius:8,border:"1px solid #f3f4f6",marginBottom:4}}>
                  <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,background:pc+"22",color:pc,border:`1px solid ${pc}40`,flexShrink:0,marginTop:1}}>{(act.priority||"").replace("_"," ")}</span>
                  <div style={{flex:1,fontSize:11,color:"#374151"}}>{act.action}</div>
                  <span style={{fontSize:9,color:"#9ca3af",flexShrink:0}}>{act.scope==="all_centers"?"All centers":act.centers?.join(", ")}</span>
                </div>);})}
              </SectionCard>}
            </div>)}
          </div>)}

          {/* Centers Tab */}
          {mainTab==="centers"&&(<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:10,flexWrap:"wrap"}}>
              <div><h2 style={{fontSize:19,fontWeight:800,color:"#1f2937",margin:0}}>{active}</h2><p style={{fontSize:11,color:"#9ca3af",margin:"3px 0 0"}}>{centerYears.length} school year{centerYears.length!==1?"s":""} · {totalEntries} total entries</p></div>
              <div style={{display:"flex",gap:6}}>
                {[["data","📋 Data Entry"],["analysis","🧠 Analysis"]].map(([t,lbl])=>(<button key={t} onClick={()=>setCenterTab(t)} disabled={t==="analysis"&&!hasAnalysis} style={{padding:"6px 12px",borderRadius:7,fontSize:11,fontWeight:700,border:"none",cursor:(t==="analysis"&&!hasAnalysis)?"not-allowed":"pointer",background:centerTab===t?"#7c3aed":"#f3f4f6",color:centerTab===t?"#fff":"#6b7280",opacity:(t==="analysis"&&!hasAnalysis)?0.4:1}}>{lbl}</button>))}
              </div>
            </div>

            {centerTab==="data"&&(<div>
              {!apiKey&&(<div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:10,padding:"10px 13px",marginBottom:12,display:"flex",alignItems:"center",gap:10,fontSize:11,color:"#92400e"}}>
                <span>💡</span><span>Connect Google Sheets to import survey data. <button onClick={()=>setShowApiPanel(true)} style={{background:"none",border:"none",color:"#7c3aed",fontWeight:700,cursor:"pointer",fontSize:11,padding:0}}>Set up now →</button></span>
              </div>)}
              {centerYears.length===0&&(<div style={{textAlign:"center",padding:"36px 20px",color:"#9ca3af",fontSize:12,background:"#fff",borderRadius:12,border:"2px dashed #e5e7eb",marginBottom:10}}><div style={{fontSize:26,marginBottom:8}}>📅</div>No school years added yet.</div>)}
              {centerYears.map((year,i)=>(<YearPanel key={year} year={year} isLatest={i===0} yearData={cd.years[year]} apiKey={apiKey} onUpdate={d=>updateYearData(year,d)} onRemoveYear={()=>removeYear(year)}/>))}
              {availableYears.length>0&&(showAddYear?(
                <div style={{display:"flex",gap:8,alignItems:"center",padding:10,border:"1px solid #e5e7eb",borderRadius:9,background:"#fff",marginBottom:8}}>
                  <span style={{fontSize:12,color:"#6b7280",fontWeight:600}}>School year:</span>
                  <select value={selectedNewYear} onChange={e=>setSelectedNewYear(e.target.value)} style={{border:"1px solid #e5e7eb",borderRadius:6,padding:"4px 8px",fontSize:12,outline:"none"}}>
                    {availableYears.map(y=><option key={y}>{y}</option>)}
                  </select>
                  <button onClick={addYear} style={{padding:"5px 14px",borderRadius:7,border:"none",background:"#7c3aed",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>Add</button>
                  <button onClick={()=>setShowAddYear(false)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #e5e7eb",background:"#fff",fontSize:11,cursor:"pointer",color:"#9ca3af"}}>Cancel</button>
                </div>
              ):(<button onClick={()=>setShowAddYear(true)} style={{width:"100%",border:"2px dashed #c4b5fd",borderRadius:9,padding:10,fontSize:12,color:"#7c3aed",background:"#faf5ff",cursor:"pointer",marginBottom:8,fontWeight:600}}>+ Add School Year</button>))}
              <button onClick={runCenterAnalysis} disabled={loading||totalEntries===0} style={{width:"100%",padding:12,borderRadius:10,fontSize:12,fontWeight:700,border:"none",cursor:loading||totalEntries===0?"not-allowed":"pointer",background:loading||totalEntries===0?"#e5e7eb":`linear-gradient(135deg,${IVY_NAVY},${IVY_BLUE})`,color:loading||totalEntries===0?"#9ca3af":"#fff",boxShadow:loading||totalEntries===0?"none":`0 4px 14px ${IVY_NAVY}50`}}>
                {loading?`🔄 ${loadingMsg||"Analyzing…"}`:`🧠 Analyze All Years (${totalEntries} total entries)`}
              </button>
              {totalEntries===0&&<p style={{textAlign:"center",fontSize:11,color:"#9ca3af",marginTop:5}}>Add at least one entry to run analysis.</p>}
            </div>)}

            {centerTab==="analysis"&&a&&cy&&(<div>
              <div style={{background:"#fff",borderRadius:14,border:`2px solid ${SKY_BLUE}`,padding:16,display:"flex",gap:14,alignItems:"center",marginBottom:10}}>
                <ScoreRing score={cy.score}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"white",background:IVY_NAVY,padding:"2px 10px",borderRadius:6}}>{cy.year} ★ Current Year</span>
                    {mt?.overallTrend&&<span style={{fontSize:10,color:"#6b7280"}}>Multi-year: <TrendBadge trend={mt.overallTrend}/></span>}
                  </div>
                  <p style={{fontSize:12,color:"#374151",lineHeight:1.65,margin:0}}>{cy.summary}</p>
                </div>
              </div>
              {mt?.yearlyScores?.length>1&&(<div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:"12px 14px",marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Score History</div>
                <div style={{display:"flex",gap:3,alignItems:"flex-end",height:66}}>
                  {[...mt.yearlyScores].sort((a,b)=>a.year.localeCompare(b.year)).map((y,i,arr)=>(<ScoreBar key={i} score={y.score} label={y.year} isLatest={i===arr.length-1}/>))}
                </div>
              </div>)}
              {cy.strengthThemes?.length>0&&<SectionCard title="✅ This Year's Strengths" subtitle={`${cy.strengthThemes.length} themes · ${cy.year}`} accentColor="#10b981">{cy.strengthThemes.map((s,i)=><ThemeBlock key={i} item={s} type="strength"/>)}</SectionCard>}
              {cy.improvementThemes?.length>0&&<SectionCard title="⚠️ Areas for Improvement" subtitle={cy.year} accentColor={CITRON}>{cy.improvementThemes.map((s,i)=><ThemeBlock key={i} item={s} type="concern"/>)}</SectionCard>}
              {cy.classroomSpotlights?.length>0&&<SectionCard title="🏫 Classroom Spotlights" subtitle={cy.year} accentColor={SKY_BLUE}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {cy.classroomSpotlights.map((c,i)=>{const ok=c.status==="performing_well";return(<div key={i} style={{borderRadius:9,padding:9,background:ok?"#f0fdf4":"#fffbeb",border:`1px solid ${ok?"#a7f3d0":"#fcd34d"}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:9,fontWeight:800,padding:"1px 7px",borderRadius:99,background:ok?"#d1fae5":"#fef3c7",color:ok?"#065f46":"#92400e"}}>{ok?"● Well":"● Attention"}</span>
                      <span style={{fontSize:11,fontWeight:700,color:"#1f2937"}}>{c.classroom}</span>
                    </div>
                    <ul style={{margin:0,paddingLeft:13}}>{c.highlights?.map((h,j)=><li key={j} style={{fontSize:10,color:"#4b5563",marginBottom:2}}>{h}</li>)}</ul>
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,marginTop:4}}>{c.sources?.map(s=><Pill key={s} text={s.toUpperCase()} color="#374151" bg="#f3f4f6"/>)}</div>
                  </div>);})}
                </div>
              </SectionCard>}
              {cy.inconsistencies?.length>0&&<SectionCard title="🚨 Cross-Report Inconsistencies" subtitle={`${cy.inconsistencies.length} found · ${cy.year}`} accentColor="#ef4444">{cy.inconsistencies.map((item,i)=><InconsistencyBlock key={i} item={item}/>)}</SectionCard>}
              {cy.accreditationRisks?.length>0&&<SectionCard title="🎓 Cognia Accreditation Risks" subtitle={cy.year} accentColor={IVY_NAVY}>
                <div style={{marginBottom:8,padding:"8px 10px",background:SKY_BLUE+"22",borderRadius:8,fontSize:11,color:IVY_NAVY}}>
                  Risks are mapped to Cognia's four key characteristics and the narrative write-ups that will need to address them.
                </div>
                {cy.accreditationRisks.map((r,i)=><AccreditationRiskBlock key={i} item={r}/>)}
              </SectionCard>}
              {cy.recommendedActions?.length>0&&<SectionCard title="📋 Recommended Actions" subtitle={`For ${cy.year}`} accentColor={OLIVE}>
                {cy.recommendedActions.map((act,i)=>{const pc=PRIORITY_COLOR[act.priority]||"#6b7280";return(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:7,padding:"7px 10px",background:"#fafafa",borderRadius:8,border:"1px solid #f3f4f6",marginBottom:4}}>
                  <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99,background:pc+"22",color:pc,border:`1px solid ${pc}40`,flexShrink:0,marginTop:1}}>{(act.priority||"").replace("_"," ")}</span>
                  <div style={{flex:1,fontSize:11,color:"#374151"}}>{act.action}</div>
                  <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:9,color:"#9ca3af",fontWeight:600}}>{act.owner}</div>{act.linkedTheme&&<div style={{fontSize:9,color:"#a78bfa",marginTop:1}}>↳ {act.linkedTheme}</div>}</div>
                </div>);})}
              </SectionCard>}
              {mt&&(<div style={{marginTop:4}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0 6px"}}>
                  <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                  <span style={{fontSize:10,color:"#9ca3af",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>Multi-Year Trends</span>
                  <div style={{flex:1,height:1,background:"#e5e7eb"}}/>
                </div>
                {mt.persistentStrengths?.length>0&&<SectionCard title="🏅 Persistent Strengths" subtitle="Consistent across years" accentColor="#10b981" collapsible defaultOpen={true}>{mt.persistentStrengths.map((s,i)=><ThemeBlock key={i} item={s} type="strength"/>)}</SectionCard>}
                {mt.persistentConcerns?.length>0&&<SectionCard title="🔁 Persistent Concerns" subtitle="Recurring across years" accentColor="#ef4444" collapsible defaultOpen={true}>{mt.persistentConcerns.map((s,i)=><ThemeBlock key={i} item={s} type="concern"/>)}</SectionCard>}
                {mt.emergingStrengths?.length>0&&<SectionCard title="🌱 Emerging Strengths" accentColor="#10b981" collapsible defaultOpen={false}>{mt.emergingStrengths.map((s,i)=><ThemeBlock key={i} item={s} type="strength"/>)}</SectionCard>}
                {mt.resolvedConcerns?.length>0&&<SectionCard title="✔️ Resolved Concerns" accentColor="#6b7280" collapsible defaultOpen={false}>
                  {mt.resolvedConcerns.map((s,i)=>(<div key={i} style={{borderLeft:"3px solid #9ca3af",padding:"6px 6px 6px 10px",background:"#f9fafb",borderRadius:"0 7px 7px 0",marginBottom:6}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#6b7280",marginBottom:2}}>{s.theme} <span style={{fontSize:9,color:"#9ca3af"}}>— resolved {s.resolvedIn}</span></div>
                    <p style={{fontSize:11,color:"#6b7280",margin:0}}>{s.detail}</p>
                  </div>))}
                </SectionCard>}
                {mt.classroomPatterns?.length>0&&<SectionCard title="🏫 Classroom Trends Over Time" collapsible defaultOpen={false} accentColor="#8b5cf6">
                  {mt.classroomPatterns.map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 9px",background:"#faf5ff",border:"1px solid #ede9fe",borderRadius:8,marginBottom:5}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#4c1d95",minWidth:80}}>{c.classroom}</span>
                    <div style={{flex:1,fontSize:11,color:"#374151"}}>{c.pattern}</div>
                    <TrendBadge trend={c.trend}/>
                  </div>))}
                </SectionCard>}
                {mt.inconsistencyPattern&&<SectionCard title="⚠️ Inconsistency Trend" accentColor="#f59e0b" collapsible defaultOpen={false}><p style={{fontSize:12,color:"#4b5563",lineHeight:1.65,margin:0}}>{mt.inconsistencyPattern}</p></SectionCard>}
                {mt.accreditationTrajectory&&<SectionCard title="🎓 Cognia Accreditation Trajectory" accentColor={IVY_NAVY} collapsible defaultOpen={false}><p style={{fontSize:12,color:"#4b5563",lineHeight:1.65,margin:0}}>{mt.accreditationTrajectory}</p></SectionCard>}
              </div>)}
              <button onClick={()=>setCenterTab("data")} style={{width:"100%",padding:9,borderRadius:8,border:"2px dashed #d1d5db",background:"transparent",fontSize:11,color:"#9ca3af",cursor:"pointer",marginTop:4}}>← Return to data entry</button>
            </div>)}
          </>)}
        </div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
